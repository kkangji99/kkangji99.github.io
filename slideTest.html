    .slide-toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2f6fed;
      color: #fff;
      padding: 12px 26px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 100;
    }

    .slide-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);

  <div id="slideToast" class="slide-toast"></div>
  <script>
    function showSlideToast(msg) {
      var toast = document.getElementById('slideToast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(window.__slideToastTimer);
      window.__slideToastTimer = setTimeout(function () {
        toast.classList.remove('show');
      }, 1600);
    }
    var prevBoundary = document.getElementById('prevFirstBoundary');
    var nextBoundary = document.getElementById('nextLastBoundary');
    if (prevBoundary) {
      prevBoundary.addEventListener('click', function (e) {
        e.preventDefault();
        showSlideToast('첫 페이지입니다');
      });
    }
    if (nextBoundary) {
      nextBoundary.addEventListener('click', function (e) {
        e.preventDefault();
        showSlideToast('마지막 페이지입니다');
      });
    }
  </script>
